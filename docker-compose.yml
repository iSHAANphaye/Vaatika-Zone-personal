version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: vaatika_mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vaatika_backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/vaatika-zone
      - PORT=5000
      - JWT_SECRET=vaatikazonesecretjwttokenkey12345678
      - JWT_EXPIRES_IN=30d
    depends_on:
      - mongodb
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vaatika_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  mongodb_data:
